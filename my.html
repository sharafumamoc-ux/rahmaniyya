<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahmaniyya Public School | Akampadam</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- ✅ FIXED FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAq3B6fUKrFk743O-TGXo1xtJsiizmCfZ0",
  authDomain: "rahmaniyya-c51fd.firebaseapp.com",
  projectId: "rahmaniyya-c51fd",
  storageBucket: "rahmaniyya-c51fd.firebasestorage.app",
  messagingSenderId: "996184975648",
  appId: "1:996184975648:web:25cd6e9e34fe37af824f45",
  measurementId: "G-8S5GCL42L8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

window.db = db;
window.auth = auth;
window.appId = "rahmaniyya-school";
window.firestoreUtils = { collection, doc, setDoc, addDoc, deleteDoc, onSnapshot, query };

signInAnonymously(auth);

onAuthStateChanged(auth, (user) => {
  if (user) {
    setupRealtimeListeners();
  }
});
</script>

<style>
body { font-family: 'Inter', sans-serif; }
.page { display:none }
.page.active { display:block }
.text-brand { color:#1e3a8a }
.bg-brand { background:#1e3a8a }
</style>
</head>

<body class="bg-white">

<!-- HEADER -->
<h1 class="text-center text-3xl font-bold text-brand mt-6">
Rahmaniyya Public School
</h1>

<!-- NAV -->
<div class="flex justify-center gap-6 mt-6">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('gallery')">Gallery</button>
<button onclick="showPage('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home-page" class="page active p-6">
<h2 class="text-xl font-bold">News & Updates</h2>
<div id="notif"></div>
</div>

<!-- GALLERY -->
<div id="gallery-page" class="page p-6">
<h2 class="text-xl font-bold">Gallery</h2>
<div id="gallery" class="grid grid-cols-3 gap-4"></div>
</div>

<!-- ADMIN -->
<div id="admin-page" class="page p-6">
<h2 class="text-xl font-bold">Admin Panel</h2>

<input id="img" type="file" class="border p-2">
<button onclick="upload()" class="bg-brand text-white px-4 py-2">Upload</button>

<br><br>

<input id="text" placeholder="Notification" class="border p-2">
<button onclick="addNotif()" class="bg-brand text-white px-4 py-2">Add</button>
</div>

<script>
let galleryData = [];
let notifData = [];

function showPage(p){
 document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
 document.getElementById(p+'-page').classList.add('active');
}

function setupRealtimeListeners(){
 const { db, firestoreUtils } = window;
 const { collection, onSnapshot } = firestoreUtils;

 onSnapshot(collection(db,'gallery'),snap=>{
  galleryData = snap.docs.map(d=>d.data());
  renderGallery();
 });

 onSnapshot(collection(db,'notif'),snap=>{
  notifData = snap.docs.map(d=>d.data());
  renderNotif();
 });
}

function renderGallery(){
 document.getElementById('gallery').innerHTML =
 galleryData.map(i=>`<img src="${i.url}" class="w-full h-32 object-cover">`).join('');
}

function renderNotif(){
 document.getElementById('notif').innerHTML =
 notifData.map(n=>`<p>${n.text}</p>`).join('');
}

async function upload(){
 const file = document.getElementById('img').files[0];
 const reader = new FileReader();
 reader.onload = async e=>{
  await window.firestoreUtils.addDoc(
    window.firestoreUtils.collection(window.db,'gallery'),
    { url:e.target.result }
  );
 };
 reader.readAsDataURL(file);
}

async function addNotif(){
 const text = document.getElementById('text').value;
 await window.firestoreUtils.addDoc(
   window.firestoreUtils.collection(window.db,'notif'),
   { text }
 );
}
</script>

</body>
</html>
